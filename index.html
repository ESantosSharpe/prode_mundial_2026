<script>
// ─── CAPTURA DEL HTML ORIGINAL (antes de cualquier cambio al DOM) ───────────
const ORIG_HTML = document.documentElement.outerHTML;

// ─── CONFIGURACIÓN (se completa por el wizard de setup) ──────────────────────
const CFG = JSON.parse(document.getElementById('cfg').textContent);
let MK = CFG.mk;   // Master Key de JSONBin
let BI = CFG.bi;   // Bin ID

// ─── DATOS DEL MUNDIAL ───────────────────────────────────────────────────────
const GD = {
  A:{n:'Grupo A',t:['México','Corea del Sur','Sudáfrica','Rep. Checa']},
  B:{n:'Grupo B',t:['Canadá','Suiza','Qatar','Bosnia-Herz.']},
  C:{n:'Grupo C',t:['Brasil','Marruecos','Escocia','Haití']},
  D:{n:'Grupo D',t:['EE.UU.','Paraguay','Australia','Turquía']},
  E:{n:'Grupo E',t:['Alemania','Curazao','C. de Marfil','Ecuador']},
  F:{n:'Grupo F',t:['Países Bajos','Japón','Túnez','Suecia']},
  G:{n:'Grupo G',t:['Bélgica','Egipto','Irán','Nueva Zelanda']},
  H:{n:'Grupo H',t:['España','Cabo Verde','Arabia Saudita','Uruguay']},
  I:{n:'Grupo I',t:['Francia','Senegal','Noruega','Irak']},
  J:{n:'Grupo J',t:['Argentina','Argelia','Austria','Jordania']},
  K:{n:'Grupo K',t:['Portugal','Colombia','Uzbekistán','RD Congo']},
  L:{n:'Grupo L',t:['Inglaterra','Croacia','Ghana','Panamá']}
};
const PR = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
function gms(k){return PR.map(([a,b],i)=>({mid:`${k}_${i}`,h:GD[k].t[a],aw:GD[k].t[b],k}));}
function hp(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}

// ─── API JSONBIN ──────────────────────────────────────────────────────────────
const JAPI = 'https://api.jsonbin.io/v3';
const TIMEOUT_MS = 12000;

function fetchWithTimeout(url, opts={}){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), TIMEOUT_MS);
  return fetch(url, {...opts, signal:ctrl.signal})
    .then(r=>{clearTimeout(tid);return r;})
    .catch(e=>{clearTimeout(tid);if(e.name==='AbortError')throw new Error('Tiempo de espera agotado (12s). Verificá tu conexión e intentá de nuevo.');throw e;});
}

async function binRead(){
  const r = await fetchWithTimeout(`${JAPI}/b/${BI}/latest`,{headers:{'X-Master-Key':MK}});
  if(r.status===401) throw new Error('Clave incorrecta (401). Verificá la Master Key en JSONBin.');
  if(r.status===404) throw new Error('Bin no encontrado (404). El Bin ID puede ser incorrecto.');
  if(!r.ok) throw new Error(`Error al leer (${r.status})`);
  const d = await r.json();
  return d.record ?? d;
}

async function binWrite(data){
  const r = await fetchWithTimeout(`${JAPI}/b/${BI}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':MK},
    body:JSON.stringify(data)
  });
  if(!r.ok) throw new Error(`Error al guardar (${r.status})`);
}

async function binCreate(){
  const r = await fetchWithTimeout(`${JAPI}/b`,{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':MK,'X-Bin-Name':'Prode-Mundial-2026'},
    body:JSON.stringify({users:[],results:{},settings:{fee:20000},predictions:{}})
  });
  if(!r.ok){const e=await r.text();throw new Error(`Error creando bin: ${r.status} — ${e}`);}
  const d = await r.json();
  return d.metadata.id;
}

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let DB = {users:[],results:{},settings:{fee:20000},predictions:{}};
let S  = {sc:'setup',tab:'p',user:null,adm:false,fg:'ALL',sv:false,ls:null,mt:null,modal:null,err:''};

const gu = n => DB.users.find(u=>u.name===n);
const paid = () => DB.users.filter(u=>u.paid);
const pool = () => paid().length * DB.settings.fee;
const cp   = n => Object.keys((DB.predictions[n])||{}).length;
const gd   = (n,k) => gms(k).filter(m=>((DB.predictions[n])||{})[m.mid]).length;
const $    = id => document.getElementById(id);
const se   = (id,msg) => {const e=$(id);if(e)e.textContent=msg;};
const ts   = () => {const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};

// ─── CÁLCULOS ─────────────────────────────────────────────────────────────────
function calcSc(){
  const sc={};
  for(const u of DB.users){
    const pr=(DB.predictions[u.name])||{};let pts=0,bon=0;
    for(const k of Object.keys(GD)){
      const ms=gms(k);let ok=0,pl=0;
      for(const m of ms){if(DB.results[m.mid]!==undefined)pl++;if(DB.results[m.mid]!==undefined&&pr[m.mid]===DB.results[m.mid]){pts++;ok++;}}
      if(pl===6&&ok===6)bon+=3;
    }
    sc[u.name]={pts,bon,tot:pts+bon};
  }
  return sc;
}

function calcPz(sc,srt){
  const p=pool();if(!p||!srt.length)return{};
  const pz={};const top=sc[srt[0]]?.tot||0;
  const f1=srt.filter(u=>(sc[u]?.tot||0)===top);const p1=Math.round(p*.7);
  f1.forEach(u=>{pz[u]=Math.round(p1/f1.length);});
  if(f1.length===1&&srt.length>1){const s2=srt.find(u=>!pz[u]);if(s2){const t2=sc[s2]?.tot||0;const f2=srt.filter(u=>!pz[u]&&(sc[u]?.tot||0)===t2);const p2=Math.round(p*.3);f2.forEach(u=>{pz[u]=Math.round(p2/f2.length);});}}
  return pz;
}

// ─── HELPERS GUARDADO ─────────────────────────────────────────────────────────
async function dbSave(updater){
  S.sv=true;render();
  try{
    const fresh=await binRead();
    updater(fresh);
    await binWrite(fresh);
    DB=fresh;S.ls=ts();
  }catch(e){alert('Error al guardar: '+e.message);}
  S.sv=false;render();
}

async function dbReload(){
  $('root').innerHTML='<div class="loading"><span class="spin">↻</span> Recargando…</div>';
  try{DB=await binRead();}catch(e){alert('Error al recargar: '+e.message);}
  render();
}

// ─── DOWNLOAD CONFIGURED VERSION ─────────────────────────────────────────────
function downloadConfigured(){
  const html = ORIG_HTML
    .replace('"mk":""','`"mk":"${MK}"`'.replace('`','').replace('$','').replace('{MK}',MK))
    .replace('"bi":""',`"bi":"${BI}"`);
  const html2 = ORIG_HTML
    .replace('"mk":""',`"mk":"${MK}"`)
    .replace('"bi":""',`"bi":"${BI}"`);
  const blob = new Blob([html2],{type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prode-mundial-2026-configurado.html';
  a.click();
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render(){
  if(!MK||!BI) rSetup();
  else if(S.sc==='login') rLogin();
  else rApp();
}

// ─── PANTALLA SETUP ──────────────────────────────────────────────────────────
function rSetup(){
  $('root').innerHTML=`
<div style="max-width:440px;margin:1rem auto">
<h1 style="margin-bottom:1rem">🏆 PRODE Mundial 2026 — Configuración inicial</h1>
<div class="info-box">
  <p style="font-size:13px;font-weight:600;margin-bottom:.5rem">Esta configuración la hace <u>una sola vez</u> el organizador (Eduardo)</p>
  <p class="muted">Una vez configurado, descargás el archivo listo y lo subís a Netlify. Tus compañeros solo abren la URL.</p>
</div>

<div style="margin-bottom:1.25rem">
  <div class="step"><div class="step-n">1</div><div class="step p"><p>Entrá a <a href="https://jsonbin.io" target="_blank">jsonbin.io</a>, creá una cuenta gratuita y copiá tu <strong>Master Key</strong> (aparece en la pantalla de inicio o en Account → API Keys).</p></div></div>
  <div class="step"><div class="step-n">2</div><div class="step p"><p>Pegá la Master Key acá abajo y presioná "Crear base de datos".</p></div></div>
  <div class="step"><div class="step-n">3</div><div class="step p"><p>Descargá el archivo configurado, andá a <a href="https://app.netlify.com/drop" target="_blank">netlify.com/drop</a>, arrastralo y ya tenés tu URL.</p></div></div>
</div>

<label class="lbl">Master Key de JSONBin</label>
<input type="password" id="mk-inp" placeholder="$2b$10$..." autocomplete="off" value="${MK}">
<div id="setup-err" class="err"></div>

${!BI?`<button class="btn btnp" style="width:100%;margin-top:.75rem" onclick="doSetup()">
  Crear base de datos →
</button>`:`
<div style="margin-top:.75rem;padding:.75rem;background:#d5f0d0;border:1px solid #4caf50;border-radius:8px">
  <p style="font-size:13px;font-weight:600;color:#1a5c1a">✓ Base de datos creada</p>
  <p class="muted" style="margin-top:3px">Bin ID: <code style="background:#b8e0b8;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px">${BI}</code></p>
</div>
<button class="btn btnp" style="width:100%;margin-top:.75rem" onclick="downloadConfigured()">
  ⬇ Descargar archivo configurado (para subir a Netlify)
</button>
<button class="btn" style="width:100%;margin-top:.5rem" onclick="S.sc='login';render()">
  Continuar y usar ahora →
</button>`}
</div>`;
  $('mk-inp')?.addEventListener('keydown',e=>{if(e.key==='Enter')doSetup();});
}

async function doSetup(){
  const key=($('mk-inp')?.value||'').trim();
  if(!key){se('setup-err','Ingresá tu Master Key');return;}
  MK=key;
  $('root').innerHTML='<div class="loading"><span class="spin">⏳</span> Creando base de datos…</div>';
  try{
    BI=await binCreate();
    DB={users:[],results:{},settings:{fee:20000},predictions:{}};
    rSetup();
  }catch(e){MK='';$('root').innerHTML='';rSetup();se('setup-err','Error: '+e.message+' — Revisá que la Master Key sea correcta.');}
}

// ─── PANTALLA LOGIN ──────────────────────────────────────────────────────────
function rLogin(){
  $('root').innerHTML=`
<div style="max-width:340px;margin:1rem auto">
<div style="text-align:center;margin-bottom:1.25rem">
  <div style="font-size:36px">🏆</div>
  <h1 style="margin-top:4px">PRODE Mundial 2026</h1>
  <p class="muted" style="margin-top:4px">Fase de grupos · 72 partidos · 12 grupos</p>
</div>
<div style="margin-bottom:.75rem">
  <p style="font-size:13px;font-weight:600;margin-bottom:.5rem">Seleccioná tu jugador</p>
  ${DB.users.length?DB.users.map(u=>`<div class="pchip" onclick="openLP('${u.name}')">
    <span style="font-size:13px">${u.name}</span>
    <span class="bdg ${u.paid?'bgp':'bgx'}">${u.paid?'Pagó':'Pendiente'}</span>
  </div>`).join(''):`<p class="muted" style="padding:.4rem 0">Sin jugadores registrados aún. Sé el primero.</p>`}
</div>
<button class="btn btnp" style="width:100%;margin-bottom:.75rem" onclick="openReg()">+ Registrarme como nuevo jugador</button>
<div style="display:flex;align-items:center;gap:8px;margin:.6rem 0">
  <div style="flex:1;height:1px;background:#e5e5e5"></div><span class="muted">admin</span><div style="flex:1;height:1px;background:#e5e5e5"></div>
</div>
<div style="display:flex;gap:7px;margin-top:.6rem">
  <input type="password" id="adm-pin" placeholder="PIN administrador (2026)">
  <button class="btn" onclick="doAdm()">Entrar</button>
</div>
<div id="lerr" class="err"></div>
<div style="margin-top:1rem;text-align:center">

</div>
${S.modal==='lp'?rLPM():''}${S.modal==='reg'?rRegM():''}`;

}

<div class="mt">Ingresar como <strong>${S.mt}</strong></div>

</div></div></div>`;}

// ─── APP PRINCIPAL ───────────────────────────────────────────────────────────
function rApp(){
  const sc=calcSc();const srt=DB.users.map(u=>u.name).sort((a,b)=>(sc[b]?.tot||0)-(sc[a]?.tot||0));
  const pc=cp(S.user);const pct=Math.round(pc/72*100);

// ─── TAB: PRONÓSTICOS ─────────────────────────────────────────────────────────
function rPron(){
  const pr=(DB.predictions[S.user])||{};
  const locked=gu(S.user)?.locked;
  const gks=Object.keys(GD);const active=S.fg==='ALL'?gks:[S.fg];
  const totalDone=Object.keys(pr).length;

  const flt=`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.7rem">
    <button class="gfb${S.fg==='ALL'?' on':''}" onclick="setFg('ALL')">Todos</button>
    ${gks.map(g=>{const d=gd(S.user,g);return`<button class="gfb${S.fg===g?' on':''}${d===6?' dn':''}" onclick="setFg('${g}')">${g}</button>`;}).join('')}
  </div>`;

  const blk=active.map(k=>{
    const ms=gms(k);const done=ms.filter(m=>pr[m.mid]).length;
    const ar=ms.every(m=>DB.results[m.mid]!==undefined);
    const be=ar&&ms.every(m=>pr[m.mid]===DB.results[m.mid]);
    const bh=be?'<span style="color:#1a6b1a;font-size:11px">+3 ✓</span>':done===6&&!ar?'<span style="color:#1a6b1a;font-size:11px">+3 posibles</span>':'';
    const rows=ms.map(m=>{
      const sel=pr[m.mid],res=DB.results[m.mid];
      if(locked){
        const roCls=v=>`pk-ro p${v}${sel===v?' sl-ro':''}`;
        const okBadge=res!==undefined&&sel?` <span style="font-size:10px;margin-left:2px">${sel===res?'✓':'✗'}</span>`:'';
        return`<div class="mr"><span class="tm">${m.h}</span><div class="ps"><span class="${roCls('H')}">1</span><span class="${roCls('D')}">X</span><span class="${roCls('A')}">2</span></div><span class="tm ta">${m.aw}${okBadge}</span></div>`;
      }
      const c=v=>{let x=`pk p${v}`;if(sel===v)x+=' sl';if(res!==undefined&&sel===v)x+=(res===v?' ok':' bad');return x;};
      return`<div class="mr"><span class="tm">${m.h}</span><div class="ps"><button class="${c('H')}" data-m="${m.mid}" data-v="H">1</button><button class="${c('D')}" data-m="${m.mid}" data-v="D">X</button><button class="${c('A')}" data-m="${m.mid}" data-v="A">2</button></div><span class="tm ta">${m.aw}</span></div>`;
    }).join('');
    return`<div class="gb"><div class="gh"><span>${GD[k].n} — ${GD[k].t.join(', ')}</span><span>${done}/6 ${bh}</span></div>${rows}</div>`;
  }).join('');

  if(locked){
    return`<div class="lock-banner">🔒 <strong>Pronósticos enviados y bloqueados.</strong> Ya no podés modificarlos. Si hubo un error, pedile al organizador que te desbloquee.</div>
${flt}${blk}`;
  }

  const footer=`<div class="stky">
  <div style="display:flex;gap:8px">
    <button class="btn" style="flex:1" onclick="savePr()"><i class="ti ti-device-floppy"></i> Guardar borrador${S.sv?' …':''}</button>
    <button class="btn" style="flex:1;background:#1a5c1a;color:#fff;border-color:#1a5c1a" onclick="confirmLock()">🔒 Enviar pronósticos</button>
  </div>
  ${S.ls?`<p class="muted" style="text-align:center;margin-top:3px">Borrador guardado ${S.ls}</p>`:''}
  <p class="muted" style="text-align:center;margin-top:4px">Tenés ${totalDone}/72 cargados. <strong>Al enviar quedan bloqueados definitivamente.</strong></p>
</div>`;

  return`${flt}${blk}${footer}${S.modal==='lock'?rLockM(totalDone):''}`;
}

function rLockM(done){
  return`<div class="modal-bg" onclick="cmBg(event)"><div class="modal">
<div class="mt">🔒 Confirmar envío de pronósticos</div>
<div style="background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:.85rem;margin-bottom:1rem;font-size:13px">
  <strong>¡Atención! Esta acción es irreversible.</strong><br>
  Una vez enviados, tus pronósticos quedan bloqueados y no podrás modificarlos.<br><br>

  <div class="card"><p class="muted">Participantes</p><p style="font-size:19px;font-weight:600">${DB.users.length}</p></div>

// ─── LISTENERS ────────────────────────────────────────────────────────────────
function addEvs(){
  document.querySelectorAll('[data-m][data-v]').forEach(b=>b.addEventListener('click',()=>{
    if(gu(S.user)?.locked) return;
    if(!DB.predictions[S.user])DB.predictions[S.user]={};
    DB.predictions[S.user][b.dataset.m]=b.dataset.v;
    rApp();
  }));
  document.querySelectorAll('[data-r][data-val]').forEach(b=>b.addEventListener('click',()=>{
    DB.results[b.dataset.r]=b.dataset.val;rApp();
  }));
  $('pin-i')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLP();});
  $('rp2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doReg();});
  $('np2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doCP();});
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
window.setTab=t=>{S.tab=t;rApp();}
window.setFg=g=>{S.fg=g;rApp();}
window.doLogout=()=>{S.user=null;S.adm=false;S.sc='login';rLogin();}
window.cm=()=>{S.modal=null;render();}
window.cmBg=e=>{if(e.target.classList.contains('modal-bg'))cm();}
window.openLP=n=>{S.mt=n;S.modal='lp';rLogin();}
window.openReg=()=>{S.modal='reg';rLogin();}
window.openCP=()=>{S.modal='chgpin';rApp();}
window.downloadConfigured=downloadConfigured;

window.doAdm=()=>{
  const v=$('adm-pin')?.value;
  if(v==='2026'){S.adm=true;S.user='Admin';S.sc='app';S.tab='a';rApp();}
  else se('lerr','PIN incorrecto');
}

window.doLP=async()=>{
  const pin=$('pin-i')?.value||'';const u=gu(S.mt);
  if(!u){se('merr','Usuario no encontrado');return;}
  if(u.pin!==hp(pin)){se('merr','PIN incorrecto');return;}
  S.user=u.name;S.adm=false;S.modal=null;S.sc='app';S.tab='p';rApp();
}

window.doReg=async()=>{
  const n=($('rn')?.value||'').trim();const p=$('rp')?.value||'';const p2=$('rp2')?.value||'';
  if(!n){se('merr','Ingresá un nombre');return;}
  if(DB.users.find(u=>u.name===n)){se('merr','Ese nombre ya está tomado');return;}
  if(p.length<4){se('merr','PIN mínimo 4 caracteres');return;}
  if(p!==p2){se('merr','Los PINs no coinciden');return;}
  await dbSave(db=>{db.users.push({name:n,pin:hp(p),paid:false,locked:false});});
  S.user=n;S.modal=null;S.sc='app';S.tab='p';rApp();
}

window.doCP=async()=>{
  const op=$('op')?.value||'';const np=$('np')?.value||'';const np2=$('np2')?.value||'';
  const u=gu(S.user);if(!u){se('merr','Error');return;}
  if(u.pin!==hp(op)){se('merr','PIN actual incorrecto');return;}
  if(np.length<4){se('merr','Mínimo 4 caracteres');return;}
  if(np!==np2){se('merr','No coinciden');return;}
  await dbSave(db=>{const usr=db.users.find(x=>x.name===S.user);if(usr)usr.pin=hp(np);});
  S.modal=null;rApp();
}

window.savePr=async()=>{
  if(gu(S.user)?.locked){alert('Tus pronósticos están bloqueados. No podés modificarlos.');return;}
  const localPreds=JSON.parse(JSON.stringify((DB.predictions[S.user])||{}));
  await dbSave(db=>{db.predictions[S.user]=localPreds;});
}

window.saveR=async()=>{
  const localRes=JSON.parse(JSON.stringify(DB.results));
  await dbSave(db=>{db.results=localRes;});
}

window.confirmLock=()=>{S.modal='lock';rApp();}

window.doLock=async()=>{
  const localPreds=JSON.parse(JSON.stringify((DB.predictions[S.user])||{}));
  await dbSave(db=>{
    db.predictions[S.user]=localPreds;
    const u=db.users.find(x=>x.name===S.user);
    if(u) u.locked=true;
  });
  S.modal=null;rApp();
}

window.toggleLock=async n=>{
  if(!confirm(`¿Desbloquear los pronósticos de ${n}? Podrá modificarlos.`))return;
  await dbSave(db=>{const u=db.users.find(x=>x.name===n);if(u)u.locked=false;});
}


window.saveFee=async()=>{
  const fee=parseInt($('fee-i')?.value)||0;
  await dbSave(db=>{db.settings.fee=fee;});
}

window.togglePaid=async n=>{
  await dbSave(db=>{const u=db.users.find(x=>x.name===n);if(u)u.paid=!u.paid;});
}

window.removeUser=async n=>{
  if(!confirm(`¿Eliminar a ${n}? Se borrarán sus pronósticos.`))return;
  await dbSave(db=>{db.users=db.users.filter(u=>u.name!==n);delete db.predictions[n];});
}

          <button class="btn" onclick="MK='';BI='';render()">⚙ Volver al setup</button>
        </div>
        <p style="font-size:11px;color:#999;margin-top:.75rem">MK: ${MK?MK.slice(0,12)+'…':'(vacío)'} — BI: ${BI||'(vacío)'}</p>
      </div>`;
    }
  } else {
    render();
  }
})();
</script></body></html>
